name: Release

on:
  release:
    types:
      - published

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r23c
      - name: Build Android libraries
        run: ANDROID_NDK_HOME="$ANDROID_NDK_ROOT" sh ./native/build-android.sh
      - name: Package artifact
        run: |
          mkdir -p dist/imageprocessing.koplugin
          cp README.md dist/imageprocessing.koplugin/
          cp ./*.lua dist/imageprocessing.koplugin/
          cp -R resources dist/imageprocessing.koplugin/
          mkdir -p dist/imageprocessing.koplugin/libs/android/armeabi-v7a
          mkdir -p dist/imageprocessing.koplugin/libs/android/arm64-v8a
          cp libs/android/armeabi-v7a/libimageprocessing.so dist/imageprocessing.koplugin/libs/android/armeabi-v7a/
          cp libs/android/arm64-v8a/libimageprocessing.so dist/imageprocessing.koplugin/libs/android/arm64-v8a/
          cd dist
          zip -r imageprocessing.koplugin-android.zip imageprocessing.koplugin
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/imageprocessing.koplugin-android.zip

  kobo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Download koxtoolchain helper
        run: |
          mkdir -p "$HOME/koxtoolchain/refs"
          curl -fsSL https://raw.githubusercontent.com/koreader/koxtoolchain/2025.05/refs/x-compile.sh -o "$HOME/koxtoolchain/refs/x-compile.sh"
      - name: Download Kobo toolchain
        run: |
          curl -fsSL https://github.com/koreader/koxtoolchain/releases/download/2025.05/kobov5.tar.gz -o /tmp/kobov5.tar.gz
          tar -xzf /tmp/kobov5.tar.gz -C "$HOME"
          find "$HOME/x-tools" -mindepth 2 -maxdepth 2 -type d -name bin -print >> "$GITHUB_PATH"
      - name: Build Kobo library
        run: KOXTOOLCHAIN="$HOME/koxtoolchain" bash ./native/build-koxtoolchain.sh kobov5
      - name: Package artifact
        run: |
          mkdir -p dist/imageprocessing.koplugin
          cp README.md dist/imageprocessing.koplugin/
          cp ./*.lua dist/imageprocessing.koplugin/
          cp -R resources dist/imageprocessing.koplugin/
          mkdir -p dist/imageprocessing.koplugin/libs/kobo/kobov5
          cp libs/kobo/kobov5/libimageprocessing.so dist/imageprocessing.koplugin/libs/kobo/kobov5/
          cd dist
          zip -r imageprocessing.koplugin-kobo.zip imageprocessing.koplugin
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/imageprocessing.koplugin-kobo.zip

  kindle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Download koxtoolchain helper
        run: |
          mkdir -p "$HOME/koxtoolchain/refs"
          curl -fsSL https://raw.githubusercontent.com/koreader/koxtoolchain/2025.05/refs/x-compile.sh -o "$HOME/koxtoolchain/refs/x-compile.sh"
      - name: Download Kindle toolchains
        run: |
          curl -fsSL https://github.com/koreader/koxtoolchain/releases/download/2025.05/kindle.tar.gz -o /tmp/kindle.tar.gz
          curl -fsSL https://github.com/koreader/koxtoolchain/releases/download/2025.05/kindle5.tar.gz -o /tmp/kindle5.tar.gz
          curl -fsSL https://github.com/koreader/koxtoolchain/releases/download/2025.05/kindlepw2.tar.gz -o /tmp/kindlepw2.tar.gz
          curl -fsSL https://github.com/koreader/koxtoolchain/releases/download/2025.05/kindlehf.tar.gz -o /tmp/kindlehf.tar.gz
          tar -xzf /tmp/kindle.tar.gz -C "$HOME"
          tar -xzf /tmp/kindle5.tar.gz -C "$HOME"
          tar -xzf /tmp/kindlepw2.tar.gz -C "$HOME"
          tar -xzf /tmp/kindlehf.tar.gz -C "$HOME"
          find "$HOME/x-tools" -mindepth 2 -maxdepth 2 -type d -name bin -print >> "$GITHUB_PATH"
      - name: Build Kindle libraries
        run: KOXTOOLCHAIN="$HOME/koxtoolchain" bash ./native/build-koxtoolchain.sh kindle kindle5 kindlepw2 kindlehf
      - name: Package artifact
        run: |
          mkdir -p dist/imageprocessing.koplugin
          cp README.md dist/imageprocessing.koplugin/
          cp ./*.lua dist/imageprocessing.koplugin/
          cp -R resources dist/imageprocessing.koplugin/
          mkdir -p dist/imageprocessing.koplugin/libs/kindle/kindle-legacy
          mkdir -p dist/imageprocessing.koplugin/libs/kindle/kindle
          mkdir -p dist/imageprocessing.koplugin/libs/kindle/kindlepw2
          mkdir -p dist/imageprocessing.koplugin/libs/kindle/kindlehf
          cp libs/kindle/kindle-legacy/libimageprocessing.so dist/imageprocessing.koplugin/libs/kindle/kindle-legacy/
          cp libs/kindle/kindle/libimageprocessing.so dist/imageprocessing.koplugin/libs/kindle/kindle/
          cp libs/kindle/kindlepw2/libimageprocessing.so dist/imageprocessing.koplugin/libs/kindle/kindlepw2/
          cp libs/kindle/kindlehf/libimageprocessing.so dist/imageprocessing.koplugin/libs/kindle/kindlehf/
          cd dist
          zip -r imageprocessing.koplugin-kindle.zip imageprocessing.koplugin
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/imageprocessing.koplugin-kindle.zip

  pocketbook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Download koxtoolchain helper
        run: |
          mkdir -p "$HOME/koxtoolchain/refs"
          curl -fsSL https://raw.githubusercontent.com/koreader/koxtoolchain/2025.05/refs/x-compile.sh -o "$HOME/koxtoolchain/refs/x-compile.sh"
      - name: Download PocketBook toolchain
        run: |
          curl -fsSL https://github.com/koreader/koxtoolchain/releases/download/2025.05/pocketbook.tar.gz -o /tmp/pocketbook.tar.gz
          tar -xzf /tmp/pocketbook.tar.gz -C "$HOME"
          find "$HOME/x-tools" -mindepth 2 -maxdepth 2 -type d -name bin -print >> "$GITHUB_PATH"
      - name: Build PocketBook library
        run: KOXTOOLCHAIN="$HOME/koxtoolchain" bash ./native/build-koxtoolchain.sh pocketbook
      - name: Package artifact
        run: |
          mkdir -p dist/imageprocessing.koplugin
          cp README.md dist/imageprocessing.koplugin/
          cp ./*.lua dist/imageprocessing.koplugin/
          cp -R resources dist/imageprocessing.koplugin/
          mkdir -p dist/imageprocessing.koplugin/libs/pocketbook/pocketbook
          cp libs/pocketbook/pocketbook/libimageprocessing.so dist/imageprocessing.koplugin/libs/pocketbook/pocketbook/
          cd dist
          zip -r imageprocessing.koplugin-pocketbook.zip imageprocessing.koplugin
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/imageprocessing.koplugin-pocketbook.zip
